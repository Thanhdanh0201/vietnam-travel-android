<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80" role="img" aria-label="Vietnam Travel logo">
  <defs>
    <style><![CDATA[
      .vietnam-red { fill: #BE1E2D; stroke: #BE1E2D; }
      .mountain { fill: #E5E7EB; }
      .letter {
        font-family: 'Montserrat', 'Be Vietnam Pro', Arial, sans-serif;
        font-weight: 900;
        font-size: 42px;
        fill: #BE1E2D;
        opacity: 0;
        animation: fadeInLetter 0.5s ease-out forwards;
      }
      @keyframes fadeInLetter {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .wave {
        fill: none;
        stroke: #BE1E2D;
        stroke-width: 2;
        stroke-linecap: round;
        opacity: 0.3;
        animation: waveMotion 3s ease-in-out infinite;
      }
      @keyframes waveMotion {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .plane-group {
        animation: flyBy 6s linear infinite;
      }
      @keyframes flyBy {
        0% { transform: translate(-40px, 35px) rotate(-10deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate(340px, -30px) rotate(-10deg); opacity: 0; }
      }
      .cyclist-group {
        animation: cycling 8s linear infinite;
      }
      @keyframes cycling {
        0% { transform: translateX(-30px); }
        100% { transform: translateX(330px); }
      }
      .climber {
        animation: climbing 4s ease-in-out infinite alternate;
      }
      @keyframes climbing {
        0% { transform: translate(0, 0); opacity: 0.4; }
        100% { transform: translate(-5px, -8px); opacity: 1; }
      }
    ]]></style>
  </defs>

  <!-- Mountain -->
  <path class="mountain" d="M220,60 L245,25 L270,60 Z"/>

  <!-- Climber on mountain -->
  <g class="climber">
    <path class="vietnam-red" d="M248,35 L252,35 L250,30 Z"/>
  </g>

  <!-- VIETNAM text -->
  <text x="10" y="55">
    <tspan class="letter" style="animation-delay: 0.1s">V</tspan>
    <tspan class="letter" style="animation-delay: 0.2s">I</tspan>
    <tspan class="letter" style="animation-delay: 0.3s">E</tspan>
    <tspan class="letter" style="animation-delay: 0.4s">T</tspan>
    <tspan class="letter" style="animation-delay: 0.5s">N</tspan>
    <tspan class="letter" style="animation-delay: 0.6s">A</tspan>
    <tspan class="letter" style="animation-delay: 0.7s">M</tspan>
  </text>

  <!-- Wave -->
  <path class="wave" d="M10,65 Q150,75 290,65"/>

  <!-- Plane -->
  <g class="plane-group">
    <path class="vietnam-red" d="M0,0 L15,5 L0,10 L3,5 Z"/>
  </g>

  <!-- Cyclist -->
  <g class="cyclist-group">
    <circle cx="10" cy="72" r="3" fill="none" stroke="#BE1E2D" stroke-width="1"/>
    <circle cx="20" cy="72" r="3" fill="none" stroke="#BE1E2D" stroke-width="1"/>
    <path fill="none" stroke="#BE1E2D" stroke-width="1" stroke-linecap="round"
          d="M10,72 L15,67 L20,72 M15,67 L15,63 L18,63"/>
  </g>
</svg>
