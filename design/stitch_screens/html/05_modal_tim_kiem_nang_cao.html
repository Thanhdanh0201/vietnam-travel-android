<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c6102e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221013",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Tìm kiếm &amp; Lọc - Vietnam Travel</title>
<style>body {
    min-height: max(884px, 100dvh)
    }
.ao-dai-pattern {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAcHWiCKub3GKz5XHDrxZiFXF4bQiXlL5dPDlwXqKUni79QbTLg_Hc9bKY3FjZP6qmufzYYzuTN0KRUYDzbvkxUW4Ne2ryp7IzrrO6zM-uo0tUUYur50wzdH4wxQwVQwACK-Vpb7mFghX7frvZXUxTBXxeEdvP-DlUZtPHGOVg-CAXzAd2PH9XVY9SVtKBjfpu3-meLjgG2-fkbm4w3t_qUNPujijTTWoGOewNfmD_i4ka64k1eDhXzGbc3DPYu9jLcIi7G3AOjNQ);
    /* Placeholder for Ao Dai inspired pattern */
    opacity: 0.03
    }</style>
</head>
<body class="bg-slate-200 font-display">
<!-- Mobile Screen Wrapper (Simulating a mobile device background) -->
<div class="relative mx-auto max-w-[430px] h-[932px] bg-white overflow-hidden shadow-2xl">
<!-- Background: Simulated Home Screen Content (Blurred) -->
<div class="absolute inset-0 blur-sm opacity-40 pointer-events-none">
<!-- Header Placeholder from Home Screen -->
<div class="p-6 flex items-center justify-between">
<span class="material-symbols-outlined text-slate-900">menu</span>
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</div>
<!-- Hero Placeholder -->
<div class="px-6 space-y-4">
<div class="h-48 w-full rounded-2xl bg-gradient-to-br from-primary/20 to-primary/5"></div>
<div class="h-8 w-3/4 bg-slate-200 rounded"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-40 bg-slate-200 rounded-xl"></div>
<div class="h-40 bg-slate-200 rounded-xl"></div>
</div>
</div>
</div>
<!-- Bottom Sheet Modal Container -->
<div class="absolute inset-0 z-50 flex flex-col justify-end bg-black/40">
<!-- Bottom Sheet Content -->
<div class="relative bg-background-light dark:bg-background-dark rounded-t-3xl w-full flex flex-col max-h-[90%] overflow-hidden">
<!-- Ao Dai Pattern Overlay -->
<div class="absolute inset-0 ao-dai-pattern pointer-events-none"></div>
<!-- BottomSheetHandle -->
<button class="flex h-6 w-full items-center justify-center shrink-0 relative z-10">
<div class="h-1.5 w-12 rounded-full bg-primary/20"></div>
</button>
<!-- Header -->
<div class="flex items-center px-4 pb-2 justify-between relative z-10">
<div class="flex items-center gap-3 flex-1">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Tìm kiếm &amp; Lọc</h2>
</div>
<button class="flex items-center justify-center p-2 text-primary hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">refresh</span>
</button>
</div>
<div class="overflow-y-auto px-4 py-4 space-y-6 relative z-10">
<!-- Search Input -->
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Tên địa điểm</label>
<div class="flex w-full h-12 items-stretch rounded-xl bg-white dark:bg-slate-800 border border-primary/20 shadow-sm overflow-hidden">
<div class="text-primary flex items-center justify-center px-4">
<span class="material-symbols-outlined">search</span>
</div>
<input class="w-full border-none bg-transparent focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 text-base font-normal" placeholder="Nhập tên địa điểm du lịch..." value=""/>
</div>
</div>
<!-- Location Chips -->
<div class="space-y-3">
<div class="flex items-center justify-between">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Tỉnh Thành</h3>
<button class="text-primary text-xs font-bold flex items-center gap-1">
<span>Chọn tỉnh khác</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</button>
</div>
<div class="flex gap-2 flex-wrap">
<button class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-primary text-white px-5 shadow-md shadow-primary/20">
<span class="text-sm font-medium">Hà Nội</span>
</button>
<button class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-5 border border-primary/10">
<span class="text-sm font-medium">Đà Lạt</span>
</button>
<button class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-5 border border-primary/10">
<span class="text-sm font-medium">TP. HCM</span>
</button>
<button class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-5 border border-primary/10">
<span class="text-sm font-medium">Phú Quốc</span>
</button>
<button class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-5 border border-primary/10">
<span class="text-sm font-medium">Đà Nẵng</span>
</button>
</div>
</div>
<!-- Rating Filter -->
<div class="space-y-3">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Đánh giá</h3>
<div class="grid grid-cols-2 gap-4">
<label class="relative flex items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary/5 cursor-pointer">
<input checked="" class="hidden" name="rating" type="radio"/>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1">trending_up</span>
<span class="text-sm font-bold text-primary">Cao nhất</span>
</div>
</label>
<label class="relative flex items-center justify-center p-3 rounded-xl border-2 border-primary/10 bg-white dark:bg-slate-800 cursor-pointer hover:bg-primary/5 transition-colors">
<input class="hidden" name="rating" type="radio"/>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-slate-400">trending_down</span>
<span class="text-sm font-bold text-slate-600 dark:text-slate-300">Thấp nhất</span>
</div>
</label>
</div>
</div>
<!-- Category Filter -->
<div class="space-y-3 pb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Loại hình</h3>
<div class="grid grid-cols-2 gap-3">
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-800 rounded-xl border border-primary/10 shadow-sm">
<input checked="" class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30" type="checkbox"/>
<span class="text-sm text-slate-900 dark:text-slate-100 font-medium">Bãi biển</span>
</div>
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-800 rounded-xl border border-primary/10 shadow-sm">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30" type="checkbox"/>
<span class="text-sm text-slate-900 dark:text-slate-100 font-medium">Văn hóa</span>
</div>
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-800 rounded-xl border border-primary/10 shadow-sm">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30" type="checkbox"/>
<span class="text-sm text-slate-900 dark:text-slate-100 font-medium">Đồi núi</span>
</div>
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-800 rounded-xl border border-primary/10 shadow-sm">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30" type="checkbox"/>
<span class="text-sm text-slate-900 dark:text-slate-100 font-medium">Thiên nhiên</span>
</div>
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-800 rounded-xl border border-primary/10 shadow-sm col-span-2">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-primary/30" type="checkbox"/>
<span class="text-sm text-slate-900 dark:text-slate-100 font-medium">Khu du lịch &amp; Resorts</span>
</div>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="p-4 border-t border-primary/10 bg-white dark:bg-background-dark relative z-10">
<button class="w-full bg-primary text-white py-4 rounded-xl font-bold text-base shadow-lg shadow-primary/30 active:scale-[0.98] transition-transform">
                        Áp dụng bộ lọc
                    </button>
</div>
</div>
</div>
</div>
</body></html>
