<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đánh giá Trải nghiệm Mũi Né</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    @keyframes slide-up {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .animate-slide-up {
      animation: slide-up 0.3s ease-out forwards;
    }
    .blur-backdrop {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
  </style>
<style data-purpose="star-rating">
    .star-rating input { display: none; }
    .star-rating label { color: #d1d5db; cursor: pointer; transition: color 0.2s; }
    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label { color: #fbbf24; }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
<!-- BEGIN: Mock Background (Blurred) -->
<main class="fixed inset-0 overflow-hidden blur-backdrop bg-black/40 z-0">
<div class="p-4 space-y-4">
<div class="h-48 bg-gray-300 rounded-lg"></div>
<div class="h-6 w-3/4 bg-gray-300 rounded"></div>
<div class="h-4 w-full bg-gray-200 rounded"></div>
<div class="h-4 w-5/6 bg-gray-200 rounded"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 bg-gray-300 rounded-lg"></div>
<div class="h-32 bg-gray-300 rounded-lg"></div>
</div>
</div>
</main>
<!-- END: Mock Background (Blurred) -->
<!-- BEGIN: Bottom Sheet Modal -->
<div class="fixed inset-0 z-50 flex items-end justify-center" data-purpose="modal-overlay" id="review-modal">
<!-- Clickable Overlay to close -->
<div class="absolute inset-0 bg-transparent" onclick="toggleModal()"></div>
<!-- Modal Content -->
<div class="relative w-full max-w-md bg-white rounded-t-3xl shadow-2xl animate-slide-up px-6 pt-2 pb-8" data-purpose="review-form-container">
<!-- Drag Handle -->
<div class="flex justify-center mb-4">
<div class="w-12 h-1 bg-gray-300 rounded-full"></div>
</div>
<!-- Header -->
<header class="text-center mb-6">
<h1 class="text-xl font-bold text-gray-800">Trải nghiệm của bạn tại Mũi Né</h1>
</header>
<form class="space-y-6" id="review-form">
<!-- BEGIN: Star Rating Section -->
<div class="flex flex-col items-center space-y-2" data-purpose="rating-selector">
<p class="text-sm font-medium text-gray-500 uppercase tracking-wide">Bạn cảm thấy thế nào?</p>
<div class="star-rating flex flex-row-reverse justify-center gap-2 text-3xl">
<input id="star5" name="rating" type="radio" value="5"/><label for="star5" title="5 stars">★</label>
<input id="star4" name="rating" type="radio" value="4"/><label for="star4" title="4 stars">★</label>
<input id="star3" name="rating" type="radio" value="3"/><label for="star3" title="3 stars">★</label>
<input id="star2" name="rating" type="radio" value="2"/><label for="star2" title="2 stars">★</label>
<input id="star1" name="rating" type="radio" value="1"/><label for="star1" title="1 star">★</label>
</div>
</div>
<!-- END: Star Rating Section -->
<!-- BEGIN: Comment Section -->
<div data-purpose="comment-input">
<textarea class="w-full p-4 text-gray-700 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-transparent transition resize-none placeholder-gray-400" id="user-comment" placeholder="Hãy chia sẻ cảm nhận của bạn về chuyến đi này nhé..." rows="4"></textarea>
</div>
<!-- END: Comment Section -->
<!-- BEGIN: Photo Upload Section -->
<div class="relative" data-purpose="photo-upload">
<label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-[#C6102E] rounded-xl bg-red-50/30 cursor-pointer hover:bg-red-50 transition" for="photo-input">
<div class="flex flex-col items-center justify-center pt-5 pb-6">
<!-- Camera Icon -->
<svg class="w-8 h-8 mb-2" fill="none" stroke="#C6102E" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a48.324 48.324 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<p class="text-sm font-semibold text-[#C6102E]">Thêm ảnh trải nghiệm</p>
</div>
<input accept="image/*" class="hidden" id="photo-input" multiple="" type="file"/>
</label>
</div>
<!-- END: Photo Upload Section -->
<!-- BEGIN: Form Actions -->
<div class="space-y-3" data-purpose="form-buttons">
<button class="w-full py-4 bg-[#C6102E] text-white font-bold rounded-xl shadow-lg shadow-red-200 active:scale-[0.98] transition-transform" type="submit">
            Gửi đánh giá
          </button>
<button class="w-full py-2 text-gray-500 font-medium text-sm hover:text-gray-700 transition" onclick="toggleModal()" type="button">
            Để sau
          </button>
</div>
<!-- END: Form Actions -->
</form>
</div>
</div>
<!-- END: Bottom Sheet Modal -->
<script data-purpose="modal-interactivity">
    function toggleModal() {
      const modal = document.getElementById('review-modal');
      // In a real app, this would handle opening/closing logic
      console.log('Modal toggle triggered');
      alert('Hành động đóng/hủy form');
    }

    document.getElementById('review-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Cảm ơn bạn đã chia sẻ trải nghiệm!');
    });
  </script>
</body></html>
